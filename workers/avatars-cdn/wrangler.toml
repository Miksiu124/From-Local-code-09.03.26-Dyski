name = "avatars-cdn"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# R2 bucket binding — tylko odczyt z bucketa "files"
[[r2_buckets]]
binding = "FILES"
bucket_name = "files"

# Custom domain — Worker serwuje tylko avatars/*, reszta 403
[[routes]]
pattern = "files.dyskiof.net"
custom_domain = true
