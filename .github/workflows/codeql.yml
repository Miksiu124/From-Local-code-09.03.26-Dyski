# CodeQL SAST — runs on push to default/main branches and PRs
# https://docs.github.com/en/code-security/codeql-cli/codeql-overview

name: CodeQL

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "go"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Toolchains before CodeQL init so Go/Node are on PATH for extraction metadata.
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Go lives in backend/ — autobuild often misses nested modules; manual build is reliable.
          build-mode: ${{ matrix.language == 'go' && 'manual' || 'none' }}
          source-root: ${{ matrix.language == 'go' && 'backend' || '.' }}
          # Ignore bundled agent/live-browser artefacts (megabyte JS blobs) — not app surface for SAST.
          config: |
            paths-ignore:
              - ".agents/**"

      - name: Build Go (traced)
        if: matrix.language == 'go'
        working-directory: backend
        run: go build -buildvcs=false -o "$RUNNER_TEMP/codeql-go" ./cmd/server

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
