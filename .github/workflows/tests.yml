name: Tests

on:
  push:
  pull_request:

jobs:
  # Fail if .env (secrets) is committed — SECURITY_AUDIT_2026-03
  secrets-check:
    name: No secrets in repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure .env (secrets) is not tracked
        run: |
          TRACKED=$(git ls-files | grep '\.env' | grep -v '\.example' || true)
          if [ -n "$TRACKED" ]; then
            echo "::error::CRITICAL: Secret files committed: $TRACKED — Remove from git and rotate all secrets."
            exit 1
          fi

  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run backend tests
        working-directory: backend
        run: go test -v -race -count=1 ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run frontend tests
        run: npm run test

      - name: Lint
        run: ESLINT_USE_FLAT_CONFIG=true npm run lint
