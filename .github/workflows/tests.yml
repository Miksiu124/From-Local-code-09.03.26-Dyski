name: Tests

permissions:
  contents: read

on:
  push:
  pull_request:
  # Lets branch protection "Add checks" populate after a run without a new commit.
  workflow_dispatch:

# One run per branch/PR; newer commits cancel superseded workflows (fewer flaky races on rapid pushes).
concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Fail if .env (secrets) is committed — SECURITY_AUDIT_2026-03
  secrets-check:
    name: No secrets in repo
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Ensure .env (secrets) is not tracked
        run: |
          TRACKED=$(git ls-files | grep '\.env' | grep -v '\.example' || true)
          if [ -n "$TRACKED" ]; then
            echo "::error::CRITICAL: Secret files committed: $TRACKED — Remove from git and rotate all secrets."
            exit 1
          fi

  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: gofmt (no diffs allowed)
        working-directory: backend
        run: |
          out="$(gofmt -l -e . 2>/dev/null || true)"
          if [[ -n "$out" ]]; then
            echo "::error::run gofmt on: $out"
            exit 1
          fi

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Run backend tests
        working-directory: backend
        run: go test -v -race -count=1 ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run frontend tests
        run: npm run test

      - name: Lint
        run: ESLINT_USE_FLAT_CONFIG=true npm run lint

      - name: Prisma Client (needed for Next build)
        run: npx prisma generate

      # Same compile path Docker uses — catches broken pages / types before VPS image build.
      - name: Next.js production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "true"
          NEXT_PUBLIC_APP_URL: "https://ci.local.invalid"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
          NEXT_PUBLIC_MEDIA_HOST: ""
          NEXT_PUBLIC_DISCORD_SERVER_URL: ""
