<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Witaj w newsletterze - Dyskiof</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; padding: 40px 20px; margin: 0;">
  <div style="max-width: 480px; margin: 0 auto; background: #171717; border-radius: 16px; padding: 40px; border: 1px solid rgba(255,255,255,0.06);">
    <!-- Logo / Brand -->
    <p style="font-size: 20px; font-weight: 700; color: #fff; margin: 0 0 24px;">Dyskiof</p>
    
    <h1 style="font-size: 24px; margin: 0 0 16px; color: #fff;">Witaj w newsletterze!</h1>
    <p style="color: #a3a3a3; line-height: 1.6; margin: 0 0 24px;">
      Dzięki, że się zapisałeś. Będziesz jako pierwszy wiedział o nowych treściach, promocjach i ekskluzywnych ofertach.
    </p>
    
    <a href="{{CTA_URL}}" style="display: inline-block; background: #7c3aed; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 10px; font-weight: 600; font-size: 14px;">
      Odwiedź platformę
    </a>
    
    <!-- Footer -->
    <p style="color: #737373; font-size: 12px; margin: 32px 0 0; line-height: 1.5;">
      Nie chcesz otrzymywać maili? <a href="{{UNSUBSCRIBE_URL}}" style="color: #7c3aed;">Wypisz się z newslettera</a>
    </p>
    <p style="color: #525252; font-size: 11px; margin: 8px 0 0;">
      Dyskiof · dyskiof.net
    </p>
  </div>
