<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mockup C — płynne „bloby” (Canvas 2D)</title>
  <style>
    :root {
      --bg: oklch(0.09 0.018 255);
      --fg: oklch(0.97 0.008 255);
      --muted: oklch(0.7 0.035 255);
      --border: oklch(0.34 0.03 255);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, Segoe UI, sans-serif;
      color: var(--fg);
      background-color: var(--bg);
      color-scheme: dark;
    }

    #fluid-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 56rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    .pill {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid color-mix(in oklch, var(--border) 70%, transparent);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      margin: 0 0 0.5rem;
    }

    .lead {
      color: var(--muted);
      max-width: 44ch;
      line-height: 1.55;
      margin: 0 0 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .card {
      aspect-ratio: 3 / 4;
      border-radius: 0.65rem;
      background: linear-gradient(145deg, oklch(0.22 0.03 255), oklch(0.12 0.02 255));
      border: 1px solid color-mix(in oklch, var(--border) 55%, transparent);
    }
  </style>
</head>
<body>
  <canvas id="fluid-canvas" aria-hidden="true"></canvas>
  <div class="wrap">
    <span class="pill">Mockup C — Canvas 2D · miękkie bloby</span>
    <h1>Płynniejszy ruch niż czyste CSS</h1>
    <p class="lead">
      Kilka radialnych „blobów” z additive blending — stonowane, żeby nie konkretować z treścią.
      Przy <code>prefers-reduced-motion</code> rysowany jest jeden statyczny kadr.
    </p>
    <div class="grid" aria-hidden="true">
      <div class="card"></div><div class="card"></div><div class="card"></div>
      <div class="card"></div><div class="card"></div><div class="card"></div>
      <div class="card"></div><div class="card"></div><div class="card"></div>
    </div>
  </div>
  <script>
    (function () {
      var canvas = document.getElementById("fluid-canvas");
      var ctx = canvas.getContext("2d", { alpha: true });
      var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var start = performance.now();

      /* Bazowe pozycje (0–1) + sin/cos — wolny, organiczny ruch */
      var blobs = [
        { ax: 0.38, ay: 0.28, r: 0.42, sx: 0.07, sy: 0.05, px: 0, py: 1.1, c: "rgba(99, 102, 241, 0.14)" },
        { ax: 0.7, ay: 0.52, r: 0.36, sx: 0.06, sy: 0.06, px: 2.1, py: 0.4, c: "rgba(129, 140, 248, 0.1)" },
        { ax: 0.18, ay: 0.72, r: 0.34, sx: 0.05, sy: 0.05, px: 1.3, py: 2.4, c: "rgba(167, 139, 250, 0.08)" },
        { ax: 0.52, ay: 0.18, r: 0.26, sx: 0.06, sy: 0.04, px: 0.6, py: 0.9, c: "rgba(56, 189, 248, 0.06)" },
      ];

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function paint(tSec) {
        var w = window.innerWidth;
        var h = window.innerHeight;
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#0c0f18";
        ctx.fillRect(0, 0, w, h);
        ctx.globalCompositeOperation = "lighter";
        var m = Math.max(w, h);
        for (var i = 0; i < blobs.length; i++) {
          var b = blobs[i];
          var x = b.ax + Math.sin(tSec * b.sx + b.px) * 0.06;
          var y = b.ay + Math.cos(tSec * b.sy + b.py) * 0.05;
          var grd = ctx.createRadialGradient(x * w, y * h, 0, x * w, y * h, b.r * m * 0.92);
          grd.addColorStop(0, b.c);
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(x * w, y * h, b.r * m, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function step(now) {
        var tSec = (now - start) / 1000;
        paint(tSec);
        requestAnimationFrame(step);
      }

      resize();
      window.addEventListener("resize", function () {
        resize();
        paint(reduced ? 0 : (performance.now() - start) / 1000);
      });

      if (reduced) {
        paint(0);
      } else {
        requestAnimationFrame(step);
      }
    })();
  </script>
</body>
</html>
