worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server_tokens off;
    client_max_body_size 50M;

    # --- DEFAULT SERVER (Ghost Mode / No SSL Leak) ---
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;
        
        # Odrzuca handshake SSL dla zapytań po IP - klucz do Stealth Mode
        ssl_reject_handshake on;
        
        return 444;
    }

    # --- HTTP -> HTTPS REDIRECT ---
    server {
        listen 80;
        server_name dyskiofleaks.com www.dyskiofleaks.com;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- MAIN SERVER (The Fortress - A+ Score) ---
    server {
        listen 443 ssl;
        http2 on;
        server_name dyskiofleaks.com www.dyskiofleaks.com;

        # Certyfikaty SSL (Let's Encrypt)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        
        # Cloudflare Authenticated Origin Pulls
        ssl_client_certificate /etc/nginx/certs/security/cloudflare-origin.crt;
        ssl_verify_client on;

        # --- NAGŁÓWKI BEZPIECZEŃSTWA (MAX SCORE VERSION) ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Content Security Policy - Ta wersja usuwa kary Mozilli za 'unsafe'
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # SSL Optimization
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # --- BACKEND API ---
        location /api/ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Zapobiega dublowaniu nagłówków (usuwa błędy parsowania)
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header X-Powered-By;
        }

        # --- FRONTEND APP ---
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header X-Powered-By;
        }
    }
}