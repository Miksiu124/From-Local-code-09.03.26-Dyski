worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server_tokens off;
    client_max_body_size 50M;

    # --- LOCAL DEVELOPMENT SERVER (HTTP only) ---
    server {
        listen 80;
        server_name localhost;

        # BLIK WebSocket must reach Go (Next.js App Router does not proxy WS upgrades)
        location ~ ^/api/credits/purchase/[0-9a-fA-F-]+/blik$ {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            set $client_ip $remote_addr;
            if ($http_cf_connecting_ip) {
                set $client_ip $http_cf_connecting_ip;
            }
            proxy_set_header X-Real-IP $client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_hide_header X-Powered-By;
        }

        # BFF: /api/* → Next.js → Go (internal Docker network)
        location /api/ {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            set $client_ip $remote_addr;
            if ($http_cf_connecting_ip) {
                set $client_ip $http_cf_connecting_ip;
            }
            proxy_set_header X-Real-IP $client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 50M;
            proxy_hide_header X-Powered-By;
        }

        # --- FRONTEND APP ---
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            set $client_ip_front $remote_addr;
            if ($http_cf_connecting_ip) {
                set $client_ip_front $http_cf_connecting_ip;
            }
            proxy_set_header X-Real-IP $client_ip_front;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_hide_header X-Powered-By;
        }
    }
}
