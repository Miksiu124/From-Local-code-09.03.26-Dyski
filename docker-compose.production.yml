# ═══════════════════════════════════════════════════════════════
# Content Platform — Docker Compose PRODUCTION Override
# ═══════════════════════════════════════════════════════════════
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# This file overrides the base docker-compose.yml with
# production-specific settings.
# ═══════════════════════════════════════════════════════════════

services:
  api:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports: !override
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports: !override
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  postgres:
    restart: always
    command: >
      postgres
      -c log_connections=off
      -c log_disconnections=off
      -c log_statement=none
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.conf.production:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certs/security:/etc/nginx/certs/security:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
