# Postgres: klastrowy layout (PGDATA=/var/lib/postgresql/18/docker, wolumen contentvault_postgres_cluster).
# Od wersji z wpisem `postgres:` w docker-compose.vps.yml ten plik jest zbędny przy `base + vps`,
# ale zostaje dla istniejących wpisów COMPOSE_FILE=...use3566349.yml na serwerach i dla kompatybilności wstecz.
# Skan wolumenów: scripts/scan-postgres-volumes-revenue.sh
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml -f docker-compose.lgtm.yml -f docker-compose.use3566349.yml up -d
#
# Wolumen Docker: contentvault_postgres_cluster (external — tworzysz ręcznie / skryptem migracji).

services:
  postgres:
    environment:
      PGDATA: /var/lib/postgresql/18/docker
    volumes: !override
      - contentvault_postgres_cluster:/var/lib/postgresql
      - ./backend/migrations:/docker-entrypoint-initdb.d

volumes:
  contentvault_postgres_cluster:
    external: true
