# ═══════════════════════════════════════════════════════════════
# Content Platform — Docker Compose (Updated for Local Access)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Go API Server ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: content-api
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://platform:${POSTGRES_PASSWORD}@postgres:5432/content_platform?sslmode=disable
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      - PORT=8080
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      # Observability: last DB backup file — mount postgres_backups (docker-compose.vps.yml) i ustaw w .env: POSTGRES_BACKUP_DIR=/backups
      - POSTGRES_BACKUP_DIR=${POSTGRES_BACKUP_DIR:-}
      - POSTGRES_BACKUP_DB_NAME=${POSTGRES_BACKUP_DB_NAME:-content_platform}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      smtp:
        condition: service_started
    networks:
      - internal

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        # Baked at build time; use https://yourdomain.com in production .env before `docker compose build`
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost}
        - NEXT_PUBLIC_MEDIA_HOST=${NEXT_PUBLIC_MEDIA_HOST}
        - NEXT_PUBLIC_DISCORD_SERVER_URL=${NEXT_PUBLIC_DISCORD_SERVER_URL:-}
    container_name: content-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - API_HOST=api
      - API_URL=http://api:8080/api
      # NOTE: Set NEXT_PUBLIC_APP_URL to your domain in .env
      # e.g. NEXT_PUBLIC_APP_URL=https://yourdomain.com
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost}
      - NEXT_PUBLIC_MEDIA_HOST=${NEXT_PUBLIC_MEDIA_HOST}
      - NEXT_PUBLIC_DISCORD_SERVER_URL=${NEXT_PUBLIC_DISCORD_SERVER_URL:-}
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      - api
    networks:
      - internal

  # ── PostgreSQL ────────────────────────────────────────────────
  # 2GB + shared_buffers for aggressive disk cache (VPS 8GB)
  postgres:
    image: postgres:18-alpine
    container_name: content-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: content_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U platform -d content_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────
  # 1GB for aggressive thumbnail + playlist cache (VPS 8GB)
  redis:
    image: redis:7-alpine
    container_name: content-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
      --lazyfree-lazy-eviction yes --lazyfree-lazy-server-del yes
      --save 60 1000 --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli $${REDIS_PASSWORD:+-a \"$$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1280M
          cpus: "0.5"
    networks:
      - internal

  # ── SMTP Relay (Postfix) ─────────────────────────────────────
  # Lightweight Postfix relay for outbound email delivery.
  # Accepts mail from the Docker network without authentication.
  # https://github.com/bokysan/docker-postfix
  smtp:
    image: boky/postfix:latest
    container_name: content-smtp
    hostname: ${SMTP_HOSTNAME:-mail.yourdomain.com}
    restart: unless-stopped
    environment:
      - ALLOWED_SENDER_DOMAINS=${SMTP_ALLOWED_DOMAINS:-yourdomain.com}
      - RELAYHOST=${SMTP_RELAYHOST:-[smtp.resend.com]:587}
      - RELAYHOST_USERNAME=${SMTP_RELAY_USERNAME:-resend}
      - RELAYHOST_PASSWORD=${SMTP_RELAY_PASSWORD:-}
      - TZ=${TZ:-UTC}
    expose:
      - "587"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "postfix", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  # Pin to 1.28+ to avoid CVE-2025-23419 (SSL session reuse); see docs/NGINX_SECURITY_AUDIT.md
  nginx:
    image: nginx:1.28-alpine
    container_name: content-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Lokalny dev. Na VPS: docker compose -f docker-compose.yml -f docker-compose.vps.yml (patrz docker-compose.vps.yml).
      - ${NGINX_CONFIG:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certs/security:/etc/nginx/certs/security:ro
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - internal

  # Eksport stub_status → Prometheus (via OTel collector w docker-compose.lgtm.yml)
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.1
    container_name: content-nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx:80/internal/nginx_status
    expose:
      - "9113"
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:


networks:
  internal:
    driver: bridge
