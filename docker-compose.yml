# ═══════════════════════════════════════════════════════════════
# Content Platform — Docker Compose (Updated for Local Access)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Go API Server ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: content-api
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://platform:${POSTGRES_PASSWORD}@postgres:5432/content_platform?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    expose:
      - "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      billionmail-postfix:
        condition: service_healthy
    networks:
      - internal

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: content-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - API_HOST=api
      - API_URL=http://api:8080/api
      # NOTE: Set NEXT_PUBLIC_APP_URL to your domain in .env
      # e.g. NEXT_PUBLIC_APP_URL=https://yourdomain.com
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    depends_on:
      - api
    networks:
      - internal

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: content-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: content_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U platform -d content_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: content-redis
    restart: unless-stopped
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"
    networks:
      - internal

  # ── BillionMail SMTP (Postfix) ───────────────────────────────
  # Self-hosted mail server — https://github.com/Billionmail/BillionMail
  billionmail-postfix:
    image: billionmail/postfix:1.6
    container_name: content-billionmail-postfix
    hostname: postfix
    restart: unless-stopped
    volumes:
      - billionmail_postfix_data:/var/spool/postfix
      - billionmail_logs:/var/log/mail
    environment:
      - TZ=${TZ:-UTC}
      - BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME:-mail.yourdomain.com}
    expose:
      - "25"
      - "587"
    ports:
      - "127.0.0.1:25:25"
      - "127.0.0.1:587:587"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "postfix status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: content-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates managed by Certbot on the host, mounted read-only
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certs/security:/etc/nginx/certs/security:ro
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  billionmail_postfix_data:
  billionmail_logs:


networks:
  internal:
    driver: bridge
