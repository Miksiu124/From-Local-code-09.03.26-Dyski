# ═══════════════════════════════════════════════════════════════
# Content Platform — Nginx Configuration
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.apple.mpegurl;

    # ── Rate Limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=streaming:10m rate=100r/s;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── WAF-style Blocking ───────────────────────────────────
    # Block common attack patterns
    map $request_uri $block_request {
        default 0;
        ~*\.(env|git|svn|htaccess|htpasswd|bak|old|backup)$ 1;
        ~*/(\.well-known/|wp-admin|wp-login|phpMyAdmin|phpmyadmin) 1;
        ~*\.(php|asp|aspx|jsp|cgi)$ 1;
    }

    # ── Upstream ─────────────────────────────────────────────
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Server Block ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        proxy_hide_header X-Powered-By;

        # Block suspicious requests
        if ($block_request) {
            return 444;
        }

        # Block suspicious user agents
        if ($http_user_agent ~* (sqlmap|nikto|havij|nmap|masscan|dirbuster)) {
            return 444;
        }

        # ── Health check ─────────────────────────────────────
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Auth endpoints (strict rate limit) ───────────────
        location ~ ^/api/auth/(register|login) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Streaming endpoints (high throughput) ─────────────
        location ~ ^/api/content/.+/(segment|playlist)/ {
            limit_req zone=streaming burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Larger buffer for video segments
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;
        }

        # ── WebSocket (BLIK) ─────────────────────────────────
        location ~ ^/api/credits/purchase/.+/blik {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ── API endpoints (general rate limit) ────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend (Next.js) ───────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
