# VPS / produkcja — zawsze łącz z bazowym plikiem:
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
#
# Postgres: ten plik montuje zewnętrzny wolumen contentvault_postgres_cluster (PGDATA=.../18/docker),
# nie domyślny postgres_data. Bez tego na serwerze z danymi w klastrze kontener postgres często
# zostaje „unhealthy” albo widzisz pustą bazę.
# Pierwszy raz na hoście: docker volume create contentvault_postgres_cluster
# Albo: bash scripts/vps-up-prod.sh (tworzy wolumen i ustawia COMPOSE_FILE w .env).
#
# Ważne: docker compose -f ... -f ... pomija zmienną COMPOSE_FILE z .env — z bazą + vps.yml
# i tak dostajesz właściwy mount; jeśli dodatkowo masz COMPOSE_FILE z use3566349.yml, merge jest nieszkodliwy.
#
# Przywracanie po pomyłce: sprawdź wolumeny (docker volume ls), dane produkcyjne szukaj w
# contentvault_postgres_cluster; skan: bash scripts/scan-postgres-volumes-revenue.sh
# Observability (Grafana + OTel + Loki + Tempo, jeden obraz grafana/otel-lgtm):
#   + -f docker-compose.lgtm.yml
#   Na VPS: utwórz .env.lgtm z .env.lgtm.example, potem: ten sam `up -d` z tym trzecim -f
#
# Wymusza nginx.conf.production (HTTPS, Cloudflare, BFF /api → frontend).
# Lokalnie: samo `docker-compose.yml` → nginx/nginx.conf (HTTP, prosty proxy).
#
# Kopie PostgreSQL: kontener content-postgres-backup (harmonogram @daily domyślnie).
#   docker exec content-postgres-backup /backup.sh
#   docker exec content-postgres-backup ls -la /backups/daily
#
# R2: content-postgres-backup-r2 — mirror wolumenu do s3://$R2_BUCKET/$R2_DB_BACKUP_PREFIX/
#   Domyślnie używa tych samych kluczy co API (R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY).
#   Opcjonalnie osobny token tylko pod backup: R2_BACKUP_ACCESS_KEY_ID + R2_BACKUP_SECRET_ACCESS_KEY (+ R2_BACKUP_ENDPOINT),
#   żeby nie duplikować w .env dwóch linii R2_ACCESS_KEY_ID (ostatnia nadpisuje pierwszą i psuje API).
#   Token R2: Object Read & Write na bucket.
#
# API: montaż postgres_backups → /backups (read-only); POSTGRES_BACKUP_DIR ustawione poniżej (panel admina / observability).

services:
  api:
    volumes:
      - postgres_backups:/backups:ro
    environment:
      POSTGRES_BACKUP_DIR: /backups
      # Kampanie marketingowe (cron API): domyślnie włączone na stosie VPS; wyłącz w .env: WINBACK_EMAIL_ENABLED=0 itd.
      WINBACK_EMAIL_ENABLED: ${WINBACK_EMAIL_ENABLED:-1}
      SOCIAL_PROOF_EMAIL_ENABLED: ${SOCIAL_PROOF_EMAIL_ENABLED:-1}
      # Nudge po pierwszym ulubionym — wymaga FAVORITE_NUDGE_TEMPLATE_SLUG w .env; bez sluga zostaje wyłączone w kodzie.
      FAVORITE_NUDGE_EMAIL_ENABLED: ${FAVORITE_NUDGE_EMAIL_ENABLED:-0}

  nginx:
    volumes:
      - ./nginx/nginx.conf.production:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certs/security:/etc/nginx/certs/security:ro

  postgres:
    environment:
      PGDATA: /var/lib/postgresql/18/docker
    volumes: !override
      - contentvault_postgres_cluster:/var/lib/postgresql
      - ./backend/migrations:/docker-entrypoint-initdb.d

  # ── PostgreSQL — codzienne kopie (pg_dump, rotacja daily/weekly/monthly) ──
  # Domyślnie obraz chce user postgres — na named volume często brak zapisu (UID ≠ właściciel wolumenu).
  # Root w kontenerze = zapis do /backups; sieć nadal wewnętrzna. Alternatywa: chown wolumenu do UID z:
  #   docker run --rm --entrypoint "" prodrigestivill/postgres-backup-local:18 id postgres
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:18
    container_name: content-postgres-backup
    restart: unless-stopped
    user: "0:0"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: content_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      SCHEDULE: ${POSTGRES_BACKUP_SCHEDULE:-@daily}
      TZ: ${TZ:-UTC}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: "8080"
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── Mirror kopii PostgreSQL → Cloudflare R2 (S3 API, aws s3 sync) ──
  postgres-backup-r2:
    build:
      context: ./docker/postgres-backup-r2
    container_name: content-postgres-backup-r2
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-UTC}
      R2_DB_BACKUP_SYNC_ENABLED: ${R2_DB_BACKUP_SYNC_ENABLED:-0}
      R2_DB_BACKUP_PREFIX: ${R2_DB_BACKUP_PREFIX:-db-backups}
      R2_DB_BACKUP_SYNC_CRON: ${R2_DB_BACKUP_SYNC_CRON:-45 3 * * *}
      R2_BACKUP_SYNC_DELETE: ${R2_BACKUP_SYNC_DELETE:-1}
      R2_SYNC_ON_START: ${R2_SYNC_ON_START:-0}
      # Backup może użyć innego konta/tokenu niż API — nie duplikuj w .env dwóch linii R2_ACCESS_KEY_ID (ostatnia wygrywa).
      R2_ENDPOINT: ${R2_BACKUP_ENDPOINT:-${R2_ENDPOINT:-}}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_DB_BACKUP_BUCKET_NAME: ${R2_DB_BACKUP_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_BACKUP_ACCESS_KEY_ID:-${R2_ACCESS_KEY_ID:-}}
      R2_SECRET_ACCESS_KEY: ${R2_BACKUP_SECRET_ACCESS_KEY:-${R2_SECRET_ACCESS_KEY:-}}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
    volumes:
      - postgres_backups:/backups:ro
    depends_on:
      - postgres-backup
    networks:
      - internal
    deploy:
      resources:
        limits:
          # aws s3 sync + duże .sql.gz — 128M potrafi dać OOM (exit 137)
          memory: 512M
          cpus: "0.5"

volumes:
  postgres_backups:
  contentvault_postgres_cluster:
    external: true
